# code-crew MCP server configuration
#
# Copy to: ~/.code-crew/mcp.yaml
#
# Each server entry:
#   command: executable (or "npx @package/name" shorthand)
#   args:    additional CLI arguments (list)
#   env:     environment variables; ${VAR} expands from current env
#   agents:  list of agent names that can use this server's tools
#            omit to make tools available to ALL agents
#
# Connect in the REPL:
#   /mcp list               — show configured servers + connection status
#   /mcp connect figma      — start server, list available tools
#   /mcp disconnect figma   — stop server
#   /mcp status             — show active connections

servers:
  # ─── Figma (design specs, component inspection) ──────────────────────
  # Install: npm install -g @figma/mcp-server
  # Token:   Figma → Settings → Account → Personal access tokens
  figma:
    command: npx @figma/mcp-server
    env:
      FIGMA_TOKEN: ${FIGMA_TOKEN}   # or set figma.token in config.yaml
    agents:
      - ux_lead

  # ─── Linear (issue tracker) ───────────────────────────────────────────
  # Install: npm install -g @linear/linear-mcp-server
  # Auth:    linear-mcp-server auth  (opens browser for OAuth)
  # linear:
  #   command: npx @linear/linear-mcp-server
