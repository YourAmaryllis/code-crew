  #     - architect
  #     - scrum_master

  # ─── GitHub (issues, PRs, code search) ───────────────────────────────
  # Install: gh extension install github/gh-copilot  (or use the MCP server)
  # Auth:    gh auth login
  # github:
  #   command: npx @github/mcp-server
  #   env:
  #     GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
