# ─────────────────────────────────────────────
# Semantic code search (ChromaDB + local embeddings)
#
# Runs fully locally — no API key, no server.
# The index is built automatically by /explore and stored in
# .code-crew/code-index/ inside the project root.
# Rebuild manually at any time with: /index
#
# Embedding models:
#
#   all-MiniLM-L6-v2  (DEFAULT — no extra deps)
#     Fast, ~45MB ONNX model bundled with chromadb. Good for general code search.
#
#   flax-sentence-embeddings/st-codesearch-distilroberta-base
#     Code-search optimised; finds functions and APIs by intent. ~130MB.
#     Requires: pip install sentence-transformers
#
#   microsoft/codebert-base
#     Code-aware BERT model; best for typed/statically-analysed codebases. ~500MB.
#     Requires: pip install sentence-transformers
#
#   all-mpnet-base-v2
#     High-quality general-purpose model; better recall than MiniLM, slower. ~420MB.
#     Requires: pip install sentence-transformers
#
# ─────────────────────────────────────────────
# semantic_search:
#   embedding_model: all-MiniLM-L6-v2
#   index_path: ""   # default: <project-root>/.code-crew/code-index/

# ─────────────────────────────────────────────
# Threat modeling tool
# OTM YAML (designs/TMD/*.yaml) is always generated as the primary format.
# Set a tool to also generate a converted output after /explore.
#
# threat-dragon: runs designs/TMD/scripts/otm_to_threat_dragon.py if present
#                → writes designs/TMD/<name>.threat-dragon.json
# irius-risk:    runs StartLeft CLI (pip install startleft)
#                → writes designs/TMD/<name>.iriusrisk.xml
# microsoft-tmmt: not yet supported (OTM YAML only)
# ─────────────────────────────────────────────
# threat_modeling:
#   tool: threat-dragon    # threat-dragon | irius-risk | microsoft-tmmt
#   output_dir: ""         # optional override (default: same dir as OTM YAML)

# ─────────────────────────────────────────────
# Project decomposition overrides
#
# /explore auto-detects projects from the directory structure and SAD.
# Use this section to declare additional projects or split a monorepo service
# into logical threat model units without changing the source layout.
#
# Each entry is merged into the inventory on every /threat run:
#   - Entries with the same id as an auto-detected project replace it.
#   - Entries with a new id are added alongside the auto-detected ones.
#
# Fields:
#   id           — used as the filename: designs/TMD/<id>.yaml  (required)
#   name         — human-readable display name
#   description  — scope statement sent to the threat modeling crew
#   source_dirs  — code paths to focus the crew on; omit to use the full inventory
#
# Example — decompose a monorepo portal into logical threat model units:
# projects:
#   - id: dataset-registration
#     name: Dataset Registration
#     description: >
#       API for file uploads, access to seller S3 buckets, structure validation,
#       PHI detection, data curation pipelines, format conversion, and metric collection.
#     source_dirs:
#       - portal/backend/internal/dataset
#       - portal/backend/internal/phi
#       - portal/backend/internal/convert
#   - id: container-instrumentation
#     name: Container Instrumentation
#     description: >
#       Docker container submission workflow: instrumentation, fingerprinting,
#       data exfiltration detection, and certificate generation.
#     source_dirs:
#       - portal/backend/internal/container
#       - portal/backend/internal/cert
#   - id: data-guide
#     name: Data Guide Chatbot
#     description: >
#       Conversational AI assistant for dataset discovery, guidance, and
#       recommendation. Includes RAG pipeline and LLM tool calls.
#     source_dirs:
#       - portal/backend/internal/guide
#       - portal/frontend/src/guide
# ─────────────────────────────────────────────

# ─────────────────────────────────────────────
# Domain modeling
# ─────────────────────────────────────────────
# domain:
#   methodology: event-storming   # event-storming | ddd | c4 (default: event-storming)
#   diagram_format: mermaid       # mermaid (default; only supported value today)

# ─────────────────────────────────────────────
# Verbose session logging
# When enabled, all user input and agent I/O are appended to a log file.
# Useful for debugging stuck flows or auditing agent decisions.
# ─────────────────────────────────────────────
# logging:
#   verbose: true
#   log_file: ~/.code-crew/session.log   # optional; defaults to ~/.code-crew/session-YYYY-MM-DD.log

# ─────────────────────────────────────────────
# Flow behaviour
# ─────────────────────────────────────────────
flow:
  max_retries: 3
  max_run_minutes: 30          # max wall-clock minutes per crew run; 0 = no limit
  max_session_tokens: 500000   # ~$5-8 at Sonnet pricing; 0 = no limit

# Build / test / lint commands — auto-detected by /explore, override here if needed.
# These are injected as COMMANDS_* env vars and written to .code-crew/structure.md
# so agents always use the right commands for this project.
commands:
  test:             ""   # e.g. "go test ./... -count=1 -timeout 120s" or "pytest" or "make test"
  build:            ""   # e.g. "go build ./..." or "npm run build" or "make build"
  typecheck:        ""   # e.g. "npx tsc --noEmit" or "mypy src/" — leave blank if N/A
  lint:             ""   # e.g. "golangci-lint run ./..." or "ruff check ." or "make lint"
  audit:            ""   # e.g. "go mod verify" or "pip-audit" or "npm audit"
  staging_smoke:    ""   # e.g. "go test ./integration/... -v -tags smoke" (BASE_URL prepended at runtime)
  production_smoke: ""   # e.g. "go test ./integration/... -v -tags 'smoke readonly'"
  api_spec:         ""   # e.g. "swag init -g cmd/server/main.go -o docs/"
  db_migrate:       ""   # e.g. "goose -dir migrations create" or "alembic revision --autogenerate"
