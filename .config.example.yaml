# code-crew global configuration
#
# Copy to: ~/.code-crew/config.yaml
#
# Named profiles live at ~/.code-crew/profiles/<name>.yaml
# Activate with:
#   export CODE_CREW_PROFILE=<name>   — shell
#   /profile <name>                   — REPL (switches live)
#
# Project-specific overrides: .code-crew/config.yaml in your project root

# ─────────────────────────────────────────────
# LLM backends
#
# Option A — Bedrock only (default, IAM auth, no API keys)
# ─────────────────────────────────────────────
bedrock:
  model_id: us.anthropic.claude-sonnet-4-6-20251001-v1:0
  fast_model_id: us.anthropic.claude-haiku-4-5-20251001-v1:0
  powerful_model_id: us.anthropic.claude-opus-4-8-20260101-v1:0
  region: us-east-1
  temperature: 0.2
  # guardrail_id: ""
  # guardrail_version: DRAFT

# ─────────────────────────────────────────────
# Option B — multi-provider llm: section
# When llm: is present it takes full precedence over bedrock: for model routing.
# Install provider extras: pip install -e ".[openai]" / "[groq]" / "[ollama]" / "[all-providers]"
# ─────────────────────────────────────────────
# llm:
#   default:
#     provider: bedrock
#     model: us.anthropic.claude-sonnet-4-6-20251001-v1:0
#   tiers:
#     fast:
#       provider: groq                         # cheap+fast for planning tasks
#       model: llama-3.1-8b-instant
#     standard:
#       provider: bedrock
#       model: us.anthropic.claude-sonnet-4-6-20251001-v1:0
#     powerful:
#       provider: anthropic                    # direct API for reviewer agents
#       model: claude-opus-4-8-20260101
#   agents:
#     security_lead:
#       provider: openai                       # per-agent override
#       model: gpt-4o
#     scrum_master:
#       provider: ollama                       # local model for lightweight tasks
#       model: llama3
#
# Option C — NVIDIA Build (80+ free models, no credit card required)
#   Sign up at build.nvidia.com → generate API key → store as NVIDIA_API_KEY
#   Install: pip install -e ".[openai]"  (reuses the OpenAI package)
# llm:
#   default:
#     provider: nvidia
#     model: meta/llama-3.3-70b-instruct     # 128k context — best general-purpose free model
#   tiers:
#     fast:
#       provider: nvidia
#       model: meta/llama-3.1-8b-instruct    # 128k context — fast, lightweight
#     standard:
#       provider: nvidia
#       model: meta/llama-3.3-70b-instruct   # 128k context
#     powerful:
#       provider: nvidia
#       model: nvidia/llama-3.1-nemotron-70b-instruct  # 128k context — NVIDIA-tuned 70B
#       # Alternative: meta/llama-3.1-405b-instruct    # 128k context — most capable, slower
#
# ⚠ AVOID for powerful tier:
#   nvidia/nemotron-3-super-120b-a12b   — only 4k context; causes 504 timeouts on large OTMs
#   nvidia/nemotron-4-340b-instruct     — only 4k context; same issue
#   These are mixture-of-experts models optimised for speed, not long-context tasks.
#
# Popular free NVIDIA Build models (all 128k context unless noted):
#   meta/llama-3.3-70b-instruct           — best general-purpose free model
#   meta/llama-3.1-8b-instruct            — fast, lightweight
#   meta/llama-3.1-405b-instruct          — most capable, slower
#   nvidia/llama-3.1-nemotron-70b-instruct — NVIDIA-tuned 70B, strong instruction following
#   moonshotai/kimi-k2.6                   — strong reasoning, 131k context
#   google/gemma-3-27b-it                  — efficient 27B, 131k context
#   mistralai/mistral-7b-instruct-v0.3    — efficient 7B, 32k context
#   Browse full catalog: https://build.nvidia.com/explore/discover
#
# Provider API keys (set in environment, not in this file):
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, GROQ_API_KEY, NVIDIA_API_KEY
#   Ollama: no key needed; Ollama must be running locally (ollama serve)

# ─────────────────────────────────────────────
# NVIDIA Build API key (if using provider: nvidia)
# ─────────────────────────────────────────────
# nvidia:
#   api_key: nvapi-xxxxxxxxxxxxxxxxxxxx

# ─────────────────────────────────────────────
# AWS credentials
# ─────────────────────────────────────────────
# aws:
#   profile: my-profile

# ─────────────────────────────────────────────
# Knowledge / designs repository
#
# Preferred — add designs/ as a submodule inside your platform repo:
#   git submodule add git@github.com:your-org/designs.git designs
#   code-crew auto-detects ./designs/ relative to cwd — no config needed.
#
# Or run /init to create a blank designs directory for new projects.
#
# Explicit path override (if designs/ lives elsewhere):
# designs:
#   path: /path/to/designs
#
# Definition of Done override:
# designs:
#   dod_path: SOP/SOP-DoD-Definition-of-Done.md
# ─────────────────────────────────────────────

# ─────────────────────────────────────────────
# Issue tracker
# ─────────────────────────────────────────────
issue_tracker:
  type: jira          # jira | linear | github
  project_key: PROJ
  # jira:
  #   url: https://yourorg.atlassian.net
  #   user: you@yourorg.com
  #   token: your-api-token  # https://id.atlassian.com/manage-profile/security/api-tokens
  # GitHub Issues: authenticate with: gh auth login (no extra config needed)

